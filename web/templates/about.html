

<h1>This is About page</h1>
<button hx-get="/index" hx-target="#_main" hx-indicator="#preloader">Go To HX-Index</button>
<button hx-get="/new" hx-target="#_main" hx-indicator="#preloader">Go To HX-New</button>
<button id="pr">Print Text</button>
<div id="test"></div>

<script>

    if (typeof btn === 'undefined') {

        const btn = document.getElementById("pr")
        btn.addEventListener("click", () => {
            callPYWrite('about')
        })

        eel.expose(js_write);
        function js_write(text) {
            document.getElementById("test").innerHTML = `<h1>This is About, the lazy loaded text is ${ text }.`
        }
    }
    
</script>
